<!DOCTYPE html>
<html lang="en"><head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Menu</title>
<style>
  :root{
    --ink:#263238; --sub:#78909C; --card:#fff; --bg:#ECEFF1;
    --accent:#00838F; --iqd:#1565C0; --usd:#2E7D32; --danger:#C62828;
  }
  *{box-sizing:border-box;}
  body{
    font-family:-apple-system,Segoe UI,Roboto,Tahoma,sans-serif;
    background:var(--bg); margin:0; padding:0; color:var(--ink);
  }
  .wrap{max-width:640px; margin:0 auto; padding:20px 16px 80px;}
  h1{text-align:center; color:#37474F; margin:8px 0 4px; font-size:26px;}
  .updated{text-align:center; color:var(--sub); font-size:11px; margin-bottom:18px;}
  h2{color:#37474F; border-bottom:2px solid #37474F; padding-bottom:6px; margin-top:26px; font-size:17px; display:flex; justify-content:space-between; align-items:center;}
  .grid{display:flex; flex-direction:column; gap:10px; margin-top:10px;}
  .item{
    background:var(--card); border-radius:10px; padding:12px 14px;
    display:flex; justify-content:space-between; align-items:center;
    box-shadow:0 1px 3px rgba(0,0,0,.08);
  }
  .name{font-weight:600; font-size:15px;}
  .name .ku{display:block; font-size:12px; color:var(--sub); font-weight:400;}
  .prices{display:flex; flex-direction:column; align-items:flex-end; gap:2px;}
  .price{font-weight:bold; color:var(--iqd); font-size:14px;}
  .price.usd{color:var(--usd); font-size:12px;}
  .empty{text-align:center; color:var(--sub); margin-top:40px;}

  /* ── top bar / edit toggle ─────────────────────────────────────────── */
  .topbar{position:sticky; top:0; background:var(--bg); padding:10px 0; display:flex; justify-content:flex-end; gap:8px; z-index:5;}
  button{
    font-family:inherit; font-size:13px; font-weight:600; cursor:pointer;
    border:none; border-radius:8px; padding:9px 14px;
  }
  .btn-primary{background:var(--accent); color:#fff;}
  .btn-outline{background:#fff; color:var(--accent); border:1.5px solid var(--accent);}
  .btn-danger{background:#fff; color:var(--danger); border:1.5px solid var(--danger);}
  .btn-ghost{background:transparent; color:var(--sub);}
  .btn-sm{padding:5px 9px; font-size:11px; border-radius:6px;}

  /* ── edit mode ──────────────────────────────────────────────────────── */
  .edit-item{
    background:var(--card); border-radius:10px; padding:12px; margin-bottom:8px;
    display:flex; flex-wrap:wrap; gap:8px; align-items:center;
    box-shadow:0 1px 3px rgba(0,0,0,.08);
  }
  .edit-item input{
    border:1px solid #CFD8DC; border-radius:6px; padding:7px 9px; font-size:13px;
    font-family:inherit;
  }
  .f-name{flex:1 1 140px; min-width:110px;}
  .f-nameku{flex:1 1 140px; min-width:110px;}
  .f-iqd{width:90px;}
  .f-usd{width:70px;}
  .edit-cat-row{display:flex; align-items:center; gap:8px; margin-top:26px;}
  .edit-cat-row input{
    border:none; border-bottom:2px solid #37474F; font-size:16px; font-weight:bold;
    background:transparent; padding:4px 2px; flex:1; font-family:inherit; color:#37474F;
  }
  .actions-bar{
    position:fixed; bottom:0; left:0; right:0; background:#fff;
    box-shadow:0 -2px 8px rgba(0,0,0,.08); padding:12px 16px;
    display:flex; gap:10px; justify-content:center; flex-wrap:wrap;
  }
  .lock-screen{
    max-width:280px; margin:80px auto; background:#fff; border-radius:14px;
    padding:24px; text-align:center; box-shadow:0 2px 10px rgba(0,0,0,.1);
  }
  .lock-screen input{
    width:100%; text-align:center; font-size:20px; letter-spacing:4px;
    padding:10px; border-radius:8px; border:1px solid #CFD8DC; margin:14px 0;
  }
</style>
</head>
<body>

    <h1>🍽 Menu</h1>
    <div class="updated">Updated 7/17/2026</div><h2>Hot Drinks</h2><div class="grid">

<!-- Menu data lives here as plain JSON — you can also edit prices directly
     in this block by hand if you'd rather skip the on-page editor. -->

<script>
// ── Config ───────────────────────────────────────────────────────────────
// Change this PIN so random customers who load the page can't open edit
// mode. Only relevant on the device someone is actively editing from —
// it never gets sent anywhere.
const EDIT_PIN = "1357";

// ── State ────────────────────────────────────────────────────────────────
let MENU = JSON.parse(document.getElementById('menu-data').textContent);
let editMode = false;
let unlocked = false;

function fmtIqd(v){
  v = Math.round(Number(v) || 0);
  return v.toString().replace(/\B(?=(\d{3})+(?!\d))/g, ',');
}
function fmtUsd(v){
  v = Number(v) || 0;
  return (v % 1 === 0) ? String(v) : v.toFixed(2).replace(/0+$/, '').replace(/\.$/, '');
}
function esc(s){
  return String(s || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

// ── Render: read-only customer view ─────────────────────────────────────
function renderView(){
  const wrap = document.getElementById('wrap');
  let html = `
    <div class="topbar">
      <button class="btn-ghost btn-sm" onclick="requestEdit()">✏️ Edit</button>
    </div>
    <h1>🍽 Menu</h1>
    <div class="updated">Updated ${new Date().toLocaleDateString()}</div>`;

  if (MENU.length === 0) {
    html += `<p class="empty">Menu coming soon.</p>`;
  }

  MENU.forEach(cat => {
    html += `<h2>${esc(cat.category)}</h2><div class="grid">`;
    cat.items.forEach(it => {
      html += `
        <div class="item">
          <div class="name">${esc(it.name)}${it.nameKu ? `<span class="ku">${esc(it.nameKu)}</span>` : ''}</div>
          <div class="prices">
            ${it.priceIqd ? `<span class="price">${fmtIqd(it.priceIqd)} IQD</span>` : ''}
            ${it.priceUsd ? `<span class="price usd">$${fmtUsd(it.priceUsd)}</span>` : ''}
          </div>
        </div>`;
    });
    html += `</div>`;
  });

  wrap.innerHTML = html;
}

// ── Render: PIN lock before entering edit mode ──────────────────────────
function renderLock(){
  const wrap = document.getElementById('wrap');
  wrap.innerHTML = `
    <div class="lock-screen">
      <div style="font-size:32px;">🔒</div>
      <div style="font-weight:600; margin-top:8px;">Staff PIN</div>
      <input id="pinInput" inputmode="numeric" maxlength="8" autofocus>
      <div style="display:flex; gap:8px; justify-content:center;">
        <button class="btn-outline btn-sm" onclick="renderView()">Cancel</button>
        <button class="btn-primary btn-sm" onclick="checkPin()">Unlock</button>
      </div>
    </div>`;
  document.getElementById('pinInput').addEventListener('keydown', e => {
    if (e.key === 'Enter') checkPin();
  });
}
function requestEdit(){ renderLock(); }
function checkPin(){
  const v = document.getElementById('pinInput').value.trim();
  if (v === EDIT_PIN) { unlocked = true; editMode = true; renderEdit(); }
  else { alert('Wrong PIN'); }
}

// ── Render: editor ───────────────────────────────────────────────────────
function renderEdit(){
  const wrap = document.getElementById('wrap');
  let html = `
    <div class="topbar">
      <button class="btn-outline btn-sm" onclick="editMode=false; renderView();">✕ Close editor</button>
    </div>
    <h1>✏️ Edit Menu</h1>`;

  MENU.forEach((cat, ci) => {
    html += `
      <div class="edit-cat-row">
        <input value="${esc(cat.category)}" onchange="MENU[${ci}].category=this.value">
        <button class="btn-danger btn-sm" onclick="removeCategory(${ci})">Delete category</button>
      </div>`;
    cat.items.forEach((it, ii) => {
      html += `
        <div class="edit-item">
          <input class="f-name" placeholder="Name" value="${esc(it.name)}"
                 onchange="MENU[${ci}].items[${ii}].name=this.value">
          <input class="f-nameku" placeholder="Name (Kurdish)" value="${esc(it.nameKu||'')}"
                 onchange="MENU[${ci}].items[${ii}].nameKu=this.value">
          <input class="f-iqd" type="number" placeholder="IQD" value="${it.priceIqd||''}"
                 onchange="MENU[${ci}].items[${ii}].priceIqd=Number(this.value)">
          <input class="f-usd" type="number" step="0.01" placeholder="USD" value="${it.priceUsd||''}"
                 onchange="MENU[${ci}].items[${ii}].priceUsd=Number(this.value)">
          <button class="btn-danger btn-sm" onclick="removeItem(${ci},${ii})">✕</button>
        </div>`;
    });
    html += `<button class="btn-outline btn-sm" onclick="addItem(${ci})">+ Add item</button>`;
  });

  html += `
    <div style="margin-top:24px; text-align:center;">
      <button class="btn-outline" onclick="addCategory()">+ Add category</button>
    </div>
    <div class="actions-bar">
      <button class="btn-outline" onclick="editMode=false; renderView();">Preview</button>
      <button class="btn-primary" onclick="downloadUpdated()">⬇ Download updated menu.html</button>
    </div>`;

  wrap.innerHTML = html;
}

function addItem(ci){ MENU[ci].items.push({name:'New item', nameKu:'', priceIqd:0, priceUsd:0}); renderEdit(); }
function removeItem(ci, ii){ MENU[ci].items.splice(ii,1); renderEdit(); }
function addCategory(){ MENU.push({category:'New category', items:[]}); renderEdit(); }
function removeCategory(ci){
  if (confirm('Delete this whole category?')) { MENU.splice(ci,1); renderEdit(); }
}

// ── Save: bake current MENU back into the page's data block, then
//    download the whole page as a new, self-contained HTML file. Upload
//    that file to wherever this page is hosted, replacing the old one. ──
function downloadUpdated(){
  document.getElementById('menu-data').textContent = JSON.stringify(MENU, null, 2);
  editMode = false;
  renderView(); // reset visual state so the downloaded file opens read-only
  const html = '<!DOCTYPE html>\n' + document.documentElement.outerHTML;
  const blob = new Blob([html], {type: 'text/html'});
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = 'menu.html';
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
}

renderView();
</script>
